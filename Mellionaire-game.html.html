<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Who Wants to Be a Mellionaire?</title>
<style>
body {
  font-family: 'Trebuchet MS', sans-serif;
  background: radial-gradient(circle at center, #0a1a3c 0%, #000814 80%);
  color: #f8f8f8;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 20px;
  background-attachment: fixed;
}

#game {
  max-width: 800px;
  width: 100%;
  padding: 30px;
  border-radius: 20px;
  background: rgba(0, 0, 0, 0.55);
  box-shadow: 0 0 40px rgba(0, 0, 0, 0.9), 0 0 80px #001f54 inset;
  position: relative;
  overflow: hidden;
}

#game::before {
  content: "";
  position: absolute;
  top: -150px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 600px;
  background:
    radial-gradient(circle, rgba(255,215,0,0.18) 0%, rgba(0,0,0,0) 70%),
    url('gold-dancer-pattern.png');
  background-size: 100% 100%, 300px 300px;
  background-repeat: no-repeat, repeat;
  opacity: 0.35;
  filter: blur(1px);
  border-radius: 50%;
  z-index: 0;
}

h1 {
  text-align: center;
  color: #ffd700;
  font-size: 2.2rem;
  text-shadow: 0 0 10px #000, 0 0 20px #ffd700;
  margin-bottom: 20px;
  position: relative;
  z-index: 2;
}
