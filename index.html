<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Who Wants to Be a Mellionaire?</title>

<style>
body {
  font-family: 'Trebuchet MS', sans-serif;
  background: radial-gradient(circle at center, #0a1a3c 0%, #000814 80%);
  color: #f8f8f8;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 20px;
  background-attachment: fixed;
}

/* PERMANENT MONEY LADDER (STATIC) */
#permanent-ladder {
  position: fixed;
  right: 20px;
  top: 120px;
  display: flex;
  flex-direction: column-reverse; /* lowest at bottom */
  gap: 12px;
  z-index: 10;
}

#permanent-ladder .ladder-item {
  font-size: 1.2rem;
  padding: 8px 18px;
  border: 2px solid #ffd700;
  border-radius: 10px;
  color: #ffd700;
  opacity: 0.35;
  background: rgba(0,0,0,0.4);
  transition: opacity 0.4s ease, transform 0.4s ease, text-shadow 0.4s ease, background 0.4s ease;
}

/* Permanent green for achieved rounds */
#permanent-ladder .ladder-item.reached {
  background: #0f7a0f;
  border-color: #32cd32;
  color: #fff;
  opacity: 1;
  text-shadow: 0 0 12px #32cd32;
}

/* Gold highlight for current round */
#permanent-ladder .ladder-item.active {
  opacity: 1;
  transform: scale(1.12);
  text-shadow: 0 0 12px #ffd700, 0 0 25px #ffd700;
}

/* MAIN GAME BOX */
#game {
  max-width: 800px;
  width: 100%;
  padding: 30px;
  border-radius: 20px;
  background: rgba(0, 0, 0, 0.55);
  box-shadow: 0 0 40px rgba(0, 0, 0, 0.9), 0 0 80px #001f54 inset;
  position: relative;
  overflow: hidden;
  margin-right: 200px;
}

h1 {
  text-align: center;
  color: #ffd700;
  font-size: 2.2rem;
  text-shadow: 0 0 10px #000, 0 0 20px #ffd700;
  margin-bottom: 20px;
}

#host {
  background: rgba(255,255,255,0.08);
  padding: 12px 16px;
  border-radius: 10px;
  font-style: italic;
  margin-bottom: 20px;
  border: 1px solid rgba(255,215,0,0.3);
}

#round-info {
  font-weight: bold;
  color: #ffd700;
  margin-bottom: 10px;
  text-shadow: 0 0 6px #000;
}

#question {
  font-size: 1.3rem;
  margin: 20px 0;
  padding: 15px;
  background: rgba(0,0,0,0.4);
  border: 2px solid #ffd700;
  border-radius: 12px;
  text-align: center;
  text-shadow: 0 0 6px #000;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.option-btn {
  background: linear-gradient(to bottom, #0d2a66, #081a44);
  border: 2px solid #ffd700;
  border-radius: 40px;
  padding: 14px 20px;
  color: #f8f8f8;
  cursor: pointer;
  font-size: 1.1rem;
  text-align: left;
  transition: all 0.2s ease;
  text-shadow: 0 0 6px #000;
}

.option-btn:hover {
  background: linear-gradient(to bottom, #123b8a, #0a255c);
  transform: scale(1.02);
  box-shadow: 0 0 15px rgba(255,215,0,0.4);
}

/* Suspense gold state */
.option-btn.locked {
  background: #ffd700;
  border-color: #ffea70;
  color: #000;
  box-shadow: 0 0 20px #ffd700;
}

/* Reveal states */
.option-btn.correct {
  background: #0f7a0f;
  border-color: #32cd32;
  box-shadow: 0 0 20px #32cd32;
}

.option-btn.wrong {
  background: #7a0f0f;
  border-color: #ff4500;
  box-shadow: 0 0 20px #ff4500;
}

#controls {
  margin-top: 25px;
  display: flex;
  justify-content: center;
  gap: 20px;
}

button.main {
  background: #ffd700;
  color: #000;
  border: none;
  border-radius: 12px;
  padding: 12px 20px;
  font-weight: bold;
  cursor: pointer;
  font-size: 1.1rem;
  transition: all 0.2s ease;
}

button.main:hover {
  background: #ffea70;
  transform: scale(1.05);
}

/* TRANSITION SCREEN */
#transition-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

#money-ladder {
  display: flex;
  flex-direction: column-reverse;
  gap: 14px;
  text-align: center;
}

#money-ladder .ladder-item {
  font-size: 1.6rem;
  padding: 10px 24px;
  border: 2px solid #ffd700;
  border-radius: 10px;
  color: #ffd700;
  opacity: 0.25;
  transition: opacity 0.6s ease, transform 0.6s ease, text-shadow 0.6s ease;
}

#money-ladder .ladder-item.reached {
  opacity: 1;
  text-shadow: 0 0 14px #ffd700, 0 0 28px #ffd700;
}

#money-ladder .ladder-item.current {
  opacity: 1;
  transform: scale(1.22);
  text-shadow: 0 0 22px #ffd700, 0 0 45px #ffd700;
}
</style>
</head>

<body>

<!-- STATIC PERMANENT LADDER (lowest at bottom) -->
<div id="permanent-ladder">
  <div class="ladder-item">$1</div>
  <div class="ladder-item">$100</div>
  <div class="ladder-item">$1,000</div>
  <div class="ladder-item">$10,000</div>
  <div class="ladder-item">$100,000</div>
  <div class="ladder-item">MELLIONAIRE</div>
</div>

<!-- MAIN GAME -->
<div id="game">
  <h1>Who Wants to Be a Mellionaire?</h1>
  <div id="host">Welcome to the show! Let’s see if you can become… a Mellionaire.</div>
  <div id="round-info"></div>
  <div id="question"></div>
  <div class="options"></div>
  <div id="controls">
    <button class="main" onclick="startGame()">Start Game</button>
  </div>
</div>

<!-- TRANSITION SCREEN -->
<div id="transition-screen">
  <div id="money-ladder">
    <div class="ladder-item">$1</div>
    <div class="ladder-item">$100</div>
    <div class="ladder-item">$1,000</div>
    <div class="ladder-item">$10,000</div>
    <div class="ladder-item">$100,000</div>
    <div class="ladder-item">MELLIONAIRE</div>
  </div>
</div>

<script>
const ROUNDS = [
  { name: "Round 1", prize: "$1" },
  { name: "Round 2", prize: "$100" },
  { name: "Round 3", prize: "$1,000" },
  { name: "Round 4", prize: "$10,000" },
  { name: "Round 5", prize: "$100,000" },
  { name: "Final Round", prize: "MELLIONAIRE" }
];

const QUESTIONS = {
  1: [
    { q: "WHAT IS MEL'S MIDDLE NAME?", a: ["KATE","JANE","ROSE","CLARISSA"], c: 0 },
    { q: "HOW MANY SIBLINGS DOES SHE HAVE?", a: ["ZERO","ONE","TWO","THREE"], c: 1 },
    { q: "MEL'S PARENTS NAMES ARE?", a: ["RODNEY & SANDRA","ROGER & SUZANNE","RODNEY & SUZANNE","ROGER & SANDRA"], c: 2 },
    { q: "MEL'S MAIDEN NAME IS?", a: ["HIGGINS","HASKINS","HOLLOWAY","HILL"], c: 3 }
  ],
  2: [
    { q: "WHAT HIGH SCHOOL DID MEL ATTEND?", a: ["WESTMINISTER","BLACKWOOD","IMMANUEL","WALFORD"], c: 2 },
    { q: "WHAT IS OSCAR'S MIDDLE NAME?", a: ["JACOB","JAMES","JOHN","JOEL"], c: 1 },
    { q: "WHICH INSTRUMENT DID MEL PLAY IN HIGH SCHOOL?", a: ["SAXOPHONE","GUITAR","CLARINET","TUBA"], c: 0 },
    { q: "WHAT IS MEL'S FAVOURITE SPIRIT?", a: ["RUM","GIN","VODKA","TEQUILA"], c: 1 }
  ],
  3: [
    { q: "WHAT WAS THE THEME FOR MEL'S WEDDING?", a: ["PAPER","DISCO","OCEAN","ICE"], c: 0 },
    { q: "WHERE IS SNUG COTTAGE LOCATED?", a: ["MANNUM","GOOLWA","MURRAY BRIDGE","VICTOR HARBOUR"], c: 3 },
    { q: "WHAT FLAVOUR WAS MEL'S WEDDING CAKE?", a: ["RED VELVET","LEMON","CHEESE","PISTACHIO"], c: 2 },
    { q: "MEL RECENTLY MADE A CAREER CHANGE INTO WHAT FIELD?", a: ["ACCOUNTING","EVENT MANAGEMENT","CONSTRUCTION","RELIGION"], c: 1 }
  ],
  4: [
    { q: "WHAT STAR SIGN IS MEL?", a: ["GEMINI","LIBRA","SCORPIO","ARIES"], c: 3 },
    { q: "WHAT PRIMARY SCHOOL DID MEL ATTEND?", a: ["HAPPY VALLEY","IMMANUEL","HALLET COVE","COROMANDEL"], c: 2 },
    { q: "WHAT POSITION DID MEL PLAY FOR NETBALL?", a: ["GK","C","GS","WD"], c: 0 },
    { q: "WHICH OF THE FOLLOWING BONES HAS MEL BROKEN?", a: ["COLLAR BONE","WRIST","LEG","NONE"], c: 3 }
  ],
  5: [
    { q: "WHICH OF THE FOLLOWING HAS MEL NOT TAKEN A RIDE ON?", a: ["ELEPHANT","CAMEL","HELICOPTER","MOTORBIKE"], c: 3 },
    { q: "WHAT IS THE NAME OF THE BALLET SCHOOL THAT MEL ATTENDED?", a: ["PIVOTAL DANCE ACADEMY","TENISON COLLEGE","TURNING POINT DANCE","ALL THAT JAZZ"], c: 1 },
    { q: "IN HIGH SCHOOL, MEL HAD EXCHANGE STUDENTS FROM WHICH COUNTRY?", a: ["GERMANY","ARGENTINA","JAPAN","CANADA"], c: 2 },
    { q: "IN HIGH SCHOOL, MEL WAS HOUSE CAPTAIN FOR WHICH TEAM?", a: ["ANDREWS","CAMDEN","MORPHETT","LOHE"], c: 3 }
  ],
  6: [
    { q: "AS A CHILD, WHAT WAS MEL'S FAVOURITE GAME ON SUPER NINTENDO?", a: ["SUPER MARIO BROS","ZELDA","DONKEY KONG COUNTRY","KIRBY"], c: 2 },
    { q: "AT MEL'S WEDDING, WHAT COLOUR PAPER FLOWER WAS NOT USED?", a: ["BLUE","YELLOW","GREEN","RED"], c: 0 },
    { q: "WHAT WAS THE NAME OF MEL'S GUINEA PIG?", a: ["CHARLOTTE","GINGER","PATCHES","MISSY"], c: 1 },
    { q: "MEL'S FRIENDS XMAS ORIGINATED AT WHAT WINERY?", a: ["HARNDORF","BIRD IN HAND","CHAPEL HILL","ECHIDNA"], c: 3 }
  ]
};

let currentRound = 0;
let currentQuestion = null;

function startGame() {
  currentRound = 0;
  updatePermanentLadder(currentRound);
  nextRound();
}

function nextRound() {
  if (currentRound >= ROUNDS.length) {
    document.getElementById("host").innerText = "You did it! You are officially… a Mellionaire!";
    document.getElementById("round-info").innerText = "";
    document.getElementById("question").innerText = "";
    document.querySelector(".options").innerHTML = "";
    return;
  }

  const round = ROUNDS[currentRound];
  document.getElementById("round-info").innerText = `${round.name} – Prize: ${round.prize}`;
  document.getElementById("host").innerText = "Deep breath… here comes your next question.";

  updatePermanentLadder(currentRound);

  const qList = QUESTIONS[currentRound + 1];
  currentQuestion = qList[Math.floor(Math.random() * qList.length)];

  displayQuestion();
}

function displayQuestion() {
  document.getElementById("question").innerText = currentQuestion.q;

  const optionsDiv = document.querySelector(".options");
  optionsDiv.innerHTML = "";

  currentQuestion.a.forEach((opt, index) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.innerText = opt;
    btn.onclick = () => checkAnswer(btn, index);
    optionsDiv.appendChild(btn);
  });
}

function checkAnswer(button, index) {
  const buttons = document.querySelectorAll(".option-btn");
  buttons.forEach(b => b.disabled = true);

  button.classList.add("locked");
  document.getElementById("host").innerText = "Locking that in…";

  setTimeout(() => {
    button.classList.remove("locked");

    if (index === currentQuestion.c) {
      button.classList.add("correct");
      document.getElementById("host").innerText = "That's… correct!";

      setTimeout(() => {
        showTransition(currentRound);
      }, 1200);

    } else {
      button.classList.add("wrong");
      document.getElementById("host").innerText = "Oh no… that’s not correct.";
    }

  }, 3000);
}

function updatePermanentLadder(roundIndex) {
  const items = document.querySelectorAll("#permanent-ladder .ladder-item");

  items.forEach((item, i) => {
    item.classList.remove("active");

    if (i < roundIndex) {
      item.classList.add("reached");
    }

    if (i === roundIndex) {
      item.classList.add("active");
    }
  });
}

function showTransition(roundIndex) {
  const screen = document.getElementById("transition-screen");
  const items = Array.from(document.querySelectorAll("#money-ladder .ladder-item"));

  items.forEach((item, i) => {
    item.classList.remove("reached", "current");
    if (i < roundIndex) item.classList.add("reached");
  });

  screen.style.display = "flex";

  setTimeout(() => {
    items[roundIndex].classList.add("current");
  }, 700);

  setTimeout(() => {
    screen.style.display = "none";
    currentRound++;
    nextRound();
  }, 3000);
}
</script>

</body>
</html>
