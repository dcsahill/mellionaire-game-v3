/* ===== SHUFFLED DECKS ===== */
const SHUFFLED = {};
  
function getShuffledRound(round) {
  // Load used list for this round
  const used = USED[round] || [];

  // Filter out used questions
  let available = QUESTIONS[round].filter((q, i) => !used.includes(i));

  // If all questions have been used, reset the list
  if (available.length === 0) {
    USED[round] = [];
    localStorage.setItem("USED_QUESTIONS", JSON.stringify(USED));
    available = [...QUESTIONS[round]];
  }

  // Shuffle the available questions
  for (let i = available.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [available[i], available[j]] = [available[j], available[i]];
  }

  // Save the shuffled deck for this round
  SHUFFLED[round] = available;

  return SHUFFLED[round];
}

  document.getElementById("front-page").style.display = "none";
  document.getElementById("game").style.display = "flex";

  startGame();
}

function startGame(){
  for (let r in SHUFFLED) SHUFFLED[r] = [];

  currentRound = 0;
  lastPrize = "$0";
  updatePermanentLadder(0);

  // ⭐ Reset 50/50 lifeline
 lifelineUsed = false;
document.getElementById("lifeline-5050").disabled = false;
document.getElementById("lifeline-5050").style.opacity = "1";

  nextRound();   // Load the first question
}
/* ===== LOAD NEXT ROUND ===== */
function nextRound(){
  const roundInfo = ROUNDS[currentRound];

  document.getElementById("round-info").innerText =
    `${roundInfo.name} – Prize: ${roundInfo.prize}`;

  updatePermanentLadder(currentRound);

  // ⭐ Get shuffled deck
  const deck = getShuffledRound(currentRound + 1);
  currentQuestion = deck.shift();   // take the next unused question

  // ⭐ Mark this question as used (PERSISTENT across games)
  const roundNum = currentRound + 1;
  const index = QUESTIONS[roundNum].indexOf(currentQuestion);

  if (!USED[roundNum]) USED[roundNum] = [];
  if (!USED[roundNum].includes(index)) {
    USED[roundNum].push(index);
    localStorage.setItem("USED_QUESTIONS", JSON.stringify(USED));
  }

  const locked = document.getElementById("locked-in");
  locked.style.display = "none";
  locked.innerText = "";

  displayQuestion();
}
  
/* ===== DISPLAY QUESTION ===== */
function displayQuestion(){
  document.getElementById("question").innerText = currentQuestion.q;

  const optionsDiv = document.querySelector(".options");
  optionsDiv.innerHTML = "";

  const labels = ["A","B","C","D"];

  currentQuestion.a.forEach((opt,index)=>{
    const btn = document.createElement("button");
    btn.className = "option-btn";

    const labelSpan = document.createElement("span");
    labelSpan.className = "option-label";
    labelSpan.innerText = labels[index];

    const textSpan = document.createElement("span");
    textSpan.innerText = opt;

    btn.appendChild(labelSpan);
    btn.appendChild(textSpan);

    btn.onclick = () => checkAnswer(btn,index);

    optionsDiv.appendChild(btn);
  });
}

/* ===== CHECK ANSWER ===== */
function checkAnswer(button,index){
  const buttons = document.querySelectorAll(".option-btn");
  buttons.forEach(b => b.disabled = true);

  const locked = document.getElementById("locked-in");
  locked.innerText = "LOCKED IN";
  locked.style.display = "block";

  button.classList.add("locked");

  setTimeout(()=>{

    if(index === currentQuestion.c){
      button.classList.remove("locked");
      button.classList.add("correct");

      // ⭐ Correct scoring fix:
      // Only update lastPrize when they PASS a round
      lastPrize = ROUNDS[currentRound].prize;

      setTimeout(()=>{
        locked.style.display = "none";
        currentRound++;

        if(currentRound >= ROUNDS.length){
          showWinScreen();
          return;
        }

        nextRound();
      },2000);

    } else {
      button.classList.remove("locked");
      button.classList.add("wrong");

      const allButtons = document.querySelectorAll(".option-btn");
      allButtons[currentQuestion.c].classList.add("correct");

      setTimeout(()=>{ showLossScreen(); },10000);
    }

  },5000);
}

/* ===== UPDATE LADDER ===== */
function updatePermanentLadder(roundIndex){
  const items = document.querySelectorAll("#permanent-ladder .ladder-item");

  items.forEach((item,i)=>{
    item.classList.remove("active","reached");
    if(i < roundIndex) item.classList.add("reached");
    if(i === roundIndex) item.classList.add("active");
  });
}

/* ============================================================
   ===============  WIN / LOSS SYSTEM  =========================
   ============================================================ */

function showWinScreen(){
  document.getElementById("game").style.display = "none";
  document.getElementById("winner-name").innerText = playerName;
  document.getElementById("win-title").innerText = "CONGRATULATIONS!";
  document.getElementById("win-subtext").innerText = "YOU ARE NOW A MELLIONAIRE!";
  document.getElementById("win-screen").style.display = "flex";

  saveScore(playerName,"MELLIONAIRE");
  startConfetti();
}

function showLossScreen(){
  document.getElementById("game").style.display = "none";
  document.getElementById("winner-name").innerText = playerName;
  document.getElementById("win-title").innerText = "BAD LUCK";
  document.getElementById("win-subtext").innerText = `Enjoy your ${lastPrize}`;
  document.getElementById("win-screen").style.display = "flex";

  saveScore(playerName,lastPrize);
}

function restartGame(){
  document.getElementById("win-screen").style.display = "none";
  document.getElementById("front-page").style.display = "flex";

  confettiPieces = [];
  updatePermanentLadder(0);
  renderLeaderboard();   // ← ORIGINAL LEADERBOARD RESTORED
}


/* ============================================================
   ===============  LEADERBOARD SYSTEM (TOP 60)  ===============
   ============================================================ */

function prizeToValue(prize){
  if(prize === "MELLIONAIRE") return 1000001;
  const num = parseInt(prize.replace(/[^0-9]/g,"")) || 0;
  return num;
}

function loadScores(){
  try{
    const raw = localStorage.getItem("mellionaire_scores");
    if(!raw) return [];
    return JSON.parse(raw);
  }catch(e){
    return [];
  }
}

function saveScores(arr){
  localStorage.setItem("mellionaire_scores", JSON.stringify(arr));
}

function saveScore(name, prize){
  let scores = loadScores();
  scores.push({name, prize});

  scores.sort((a,b)=> prizeToValue(b.prize) - prizeToValue(a.prize));

  if(scores.length > 60) scores = scores.slice(0,60);

  saveScores(scores);
}

function renderLeaderboard(){
  const col1 = document.getElementById("col1");
  const col2 = document.getElementById("col2");
  const col3 = document.getElementById("col3");

  col1.innerHTML = "";
  col2.innerHTML = "";
  col3.innerHTML = "";

  const scores = loadScores();
  const filled = [];

  // Always fill 60 rows
  for(let i=0;i<60;i++){
    if(scores[i]){
      filled.push({number:i+1, name:scores[i].name, prize:scores[i].prize});
    } else {
      filled.push({number:i+1, name:"—", prize:"—"});
    }
  }

  // Column 1: 1–20
  for(let i=0;i<20;i++){
    const line = document.createElement("div");
    line.className = "leaderboard-line";
    line.innerHTML = `<span class="leaderboard-name">${filled[i].number}. ${filled[i].name} — ${filled[i].prize}</span>`;
    col1.appendChild(line);
  }

  // Column 2: 21–40
  for(let i=20;i<40;i++){
    const line = document.createElement("div");
    line.className = "leaderboard-line";
    line.innerHTML = `<span class="leaderboard-name">${filled[i].number}. ${filled[i].name} — ${filled[i].prize}</span>`;
    col2.appendChild(line);
  }

  // Column 3: 41–60
  for(let i=40;i<60;i++){
    const line = document.createElement("div");
    line.className = "leaderboard-line";
    line.innerHTML = `<span class="leaderboard-name">${filled[i].number}. ${filled[i].name} — ${filled[i].prize}</span>`;
    col3.appendChild(line);
  }
}

function openLeaderboard(){
  renderLeaderboard();
  document.getElementById("leaderboard-screen").style.display = "flex";
}

function closeLeaderboard(){
  document.getElementById("leaderboard-screen").style.display = "none";
}


/* ============================================================
   ====================  NAME ENTRY SYSTEM  ====================
   ============================================================ */

function submitName(){
  const input = document.getElementById("name-input").value.trim().toUpperCase();
  if (!input) return;

  const warning = document.getElementById("name-warning");
  warning.style.display = "none";

  const scores = loadScores();
  const existingNames = scores.map(s => s.name.toUpperCase());

  if (existingNames.includes(input)) {
    warning.innerText = "NAME ALREADY EXISTS, TRY ADDING A LAST NAME INITIAL";
    warning.style.display = "block";
    return;
  }

  playerName = input;

  document.getElementById("name-screen").style.display = "none";
  beginGame();
}

function openNameScreen(){
  document.getElementById("front-page").style.display = "none";
  document.getElementById("name-screen").style.display = "flex";
  document.getElementById("name-input").value = "";
}

</script>

<!-- ⭐ PUT CONFETTI SCRIPT HERE ⭐ -->
<script>
/* ============================================================
   ====================  CONFETTI SYSTEM  ======================
   ============================================================ */

const confettiCanvas = document.getElementById("confetti-canvas");
const confettiCtx = confettiCanvas.getContext("2d");

function resizeConfetti(){
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
resizeConfetti();
window.addEventListener("resize", resizeConfetti);

let confettiPieces = [];

function createConfettiPiece(){
  return {
    x: Math.random() * confettiCanvas.width,
    y: -20,
    size: Math.random() * 8 + 4,
    speedY: Math.random() * 3 + 2,
    speedX: (Math.random() - 0.5) * 2,
    rotation: Math.random() * 360,
    rotationSpeed: (Math.random() - 0.5) * 10,
    color: Math.random() > 0.5 ? "#FFD700" : "#FFF5A3"
  };
}

function startConfetti(){
  confettiPieces = [];
  for(let i=0;i<150;i++){
    confettiPieces.push(createConfettiPiece());
  }
}

function updateConfetti(){
  confettiCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);

  confettiPieces.forEach((p,index)=>{
    p.y += p.speedY;
    p.x += p.speedX;
    p.rotation += p.rotationSpeed;

    if(p.y > confettiCanvas.height + 20){
      confettiPieces[index] = createConfettiPiece();
    }

    confettiCtx.save();
    confettiCtx.translate(p.x, p.y);
    confettiCtx.rotate((p.rotation * Math.PI) / 180);
    confettiCtx.fillStyle = p.color;
    confettiCtx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
    confettiCtx.restore();
  });

  requestAnimationFrame(updateConfetti);
}
updateConfetti();
</script>
<!-- END CONFETTI SCRIPT -->
