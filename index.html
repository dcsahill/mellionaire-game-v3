<html lang="en">
<head>

<title>Who Wants to Be a Mellionaire?</title>

body {
  font-family: 'Trebuchet MS', sans-serif;
  background: radial-gradient(circle at center, #0a1a3c 0%, #000814 80%);
  color: #f8f8f8;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 20px;
  background-attachment: fixed;
}

#game {
  max-width: 800px;
  width: 100%;
  padding: 30px;
  border-radius: 20px;
  background: rgba(0, 0, 0, 0.55);
  box-shadow: 0 0 40px rgba(0, 0, 0, 0.9), 0 0 80px #001f54 inset;
  position: relative;
  overflow: hidden;
}

h1 {
  text-align: center;
  color: #ffd700;
  font-size: 2.2rem;
  text-shadow: 0 0 10px #000, 0 0 20px #ffd700;
  margin-bottom: 20px;
}

#host {
  background: rgba(255,255,255,0.08);
  padding: 12px 16px;
  border-radius: 10px;
  font-style: italic;
  margin-bottom: 20px;
  border: 1px solid rgba(255,215,0,0.3);
}

#round-info {
  font-weight: bold;
  color: #ffd700;
  margin-bottom: 10px;
  text-shadow: 0 0 6px #000;
}

#question {
  font-size: 1.3rem;
  margin: 20px 0;
  padding: 15px;
  background: rgba(0,0,0,0.4);
  border: 2px solid #ffd700;
  border-radius: 12px;
  text-align: center;
  text-shadow: 0 0 6px #000;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.option-btn {
  background: linear-gradient(to bottom, #0d2a66, #081a44);
  border: 2px solid #ffd700;
  border-radius: 40px;
  padding: 14px 20px;
  color: #f8f8f8;
  cursor: pointer;
  font-size: 1.1rem;
  text-align: left;
  transition: all 0.2s ease;
  text-shadow: 0 0 6px #000;
}

.option-btn:hover {
  background: linear-gradient(to bottom, #123b8a, #0a255c);
  transform: scale(1.02);
  box-shadow: 0 0 15px rgba(255,215,0,0.4);
}
