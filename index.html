<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Who Wants to Be a Mellionaire?</title>

<style>
/* ===== GLOBAL ===== */
body{
  font-family:'Trebuchet MS',sans-serif;
  margin:0;padding:0;overflow-x:hidden;
  background-image:url("front-page-background.png");
  background-size:cover;background-position:center;
  background-attachment:fixed;
}

/* ===== FRONT PAGE ===== */
#front-page{
  position:fixed;top:0;left:0;width:100%;height:100%;
  display:flex;justify-content:center;align-items:center;
  z-index:9999;
}
#front-background{
  position:absolute;top:0;left:0;width:100%;height:100%;
  object-fit:cover;z-index:-1;
}
#front-content{
  display:flex;flex-direction:column;align-items:center;gap:16px;
}
#front-logo{
  width:640px;max-width:90%;
  filter:drop-shadow(0 0 20px rgba(0,0,0,0.6));
}
#start-btn,#show-leaderboard-btn{
  background:#ffd700;color:#000;padding:14px 40px;
  font-size:1.2rem;border:none;border-radius:14px;
  cursor:pointer;font-weight:bold;letter-spacing:1px;
  box-shadow:0 0 18px rgba(255,215,0,0.6);
}
#start-btn:hover,#show-leaderboard-btn:hover{
  background:#ffea70;transform:scale(1.05);
}
#show-leaderboard-btn{margin-top:4px;}

/* ===== GAME LAYOUT ===== */
#layout{
  display:flex;justify-content:center;width:100%;
  position:relative;top:180px;
}
#game-wrapper{
  flex:1;display:flex;justify-content:center;padding-right:320px;
}
#game{
  max-width:650px;width:100%;padding:30px;border-radius:20px;
  background:rgba(0,0,0,0.55);backdrop-filter:blur(2px);
  box-shadow:0 0 40px rgba(0,0,0,0.9),0 0 80px #001f54 inset;
  display:none;flex-direction:column;
}
h1{text-align:center;color:#ffd700;font-size:2.2rem;margin:0 0 10px 0;}
#player-name{text-align:center;font-size:1.4rem;color:#fff;margin-bottom:10px;}
#round-info{text-align:center;font-weight:bold;color:#ffd700;margin-bottom:10px;}
#question{
  font-size:1.3rem;margin:20px 0;padding:15px;
  background:rgba(0,0,0,0.4);border:2px solid #ffd700;
  border-radius:12px;text-align:center;color:#fff;
}

/* ===== OPTIONS ===== */
.options{
  display:grid;grid-template-columns:1fr 1fr;
  gap:16px 24px;margin-top:20px;
}
.option-btn{
  display:flex;align-items:center;gap:12px;
  background:linear-gradient(to bottom,#0d2a66,#081a44);
  border:2px solid #ffd700;border-radius:40px;
  padding:14px 20px;color:#f8f8f8;cursor:pointer;
  font-size:1.05rem;
}
.option-btn:hover{background:#123b8a;transform:scale(1.02);}
.option-label{
  background:#ffd700;color:#000;font-weight:bold;
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
.option-btn.locked{background:#ffd700;color:#000;}
.option-btn.correct{background:#0f7a0f;}
.option-btn.wrong{background:#7a0f0f;}

#locked-in{
  margin-top:20px;text-align:center;font-size:2rem;
  font-weight:bold;color:#ffd700;min-height:40px;display:none;
}

/* ===== SIDE PANEL ===== */
#side-panel{
  position:fixed;top:120px;right:120px;width:240px;
  display:flex;flex-direction:column;align-items:center;
}
#millionaire-logo{width:240px;margin-bottom:20px;}
#permanent-ladder{
  width:240px;display:flex;flex-direction:column-reverse;gap:12px;
}
#permanent-ladder .ladder-item{
  font-size:1.1rem;padding:8px 18px;border:2px solid #ffd700;
  border-radius:10px;color:#ffd700;opacity:.35;
  background:rgba(0,0,0,0.4);
}
#permanent-ladder .ladder-item.reached{
  background:#0f7a0f;color:#fff;opacity:1;
}
#permanent-ladder .ladder-item.active{
  opacity:1;transform:scale(1.12);
}

/* ===== WIN SCREEN ===== */
#win-screen{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.85);backdrop-filter:blur(4px);
  display:none;justify-content:center;align-items:center;
  z-index:99998;text-align:center;
}
#confetti-canvas{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:1;
}
#win-content{position:relative;z-index:2;}
#win-content h1{
  font-size:4.5rem;color:#ffd700;margin-bottom:10px;
  text-shadow:0 0 25px #000;
}
#win-content h2{
  font-size:3rem;color:#fff;margin-bottom:6px;
  text-shadow:0 0 20px #000;
}
#win-content h3{
  font-size:2.4rem;color:#fff;margin-bottom:30px;
  text-shadow:0 0 20px #000;
}
#play-again-btn{
  background:#ffd700;color:#000;padding:16px 50px;
  font-size:1.8rem;border:none;border-radius:14px;
  cursor:pointer;font-weight:bold;letter-spacing:1px;
  box-shadow:0 0 30px rgba(255,215,0,0.7);
}
#play-again-btn:hover{background:#ffea70;transform:scale(1.08);}

/* ===== LEADERBOARD ===== */
#leaderboard-screen{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.85);backdrop-filter:blur(4px);
  display:none;justify-content:center;align-items:center;
  z-index:99999;text-align:center;color:#fff;
}
#leaderboard-content{
  width:90%;max-width:1100px;
}
#leaderboard-content h1{
  font-size:3.5rem;color:#ffd700;margin-bottom:20px;
}

/* 3 full-width columns */
#leaderboard-columns{
  display:flex;
  justify-content:center;   /* Centers the 3-column block */
  gap:180px;                 /* Space between columns */
  width:100%;                /* Shrinks the block so centering is visible */
  margin:0 auto;            /* Centers the block on the page */
}

/* Each column grows vertically (Option A) */
.leaderboard-column{
  flex:1;
  text-align:left;
  padding:0 20px;
}

/* Slightly smaller font for 20 entries */
.leaderboard-line{
  font-size:1.2rem;
  margin:3px 0;
  color:#fff;
}

#close-leaderboard-btn{
  background:#ffd700;color:#000;padding:16px 50px;
  font-size:1.6rem;border:none;border-radius:14px;
  cursor:pointer;font-weight:bold;
  box-shadow:0 0 30px rgba(255,215,0,0.7);
  margin-top:30px;
}
#close-leaderboard-btn:hover{
  background:#ffea70;transform:scale(1.08);
}
/* all your existing CSS… */
/* …lots of styles… */
/* …leaderboard styles… */

/* PASTE STEP 2 CSS RIGHT HERE */

/* NAME ENTRY SCREEN */
#name-screen{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.85);
  display:none;   /* HIDE IT UNTIL START IS CLICKED */
  justify-content:center;
  align-items:center;
  z-index:99999;
}

#name-box{
  background:rgba(0,0,0,0.6);
  border:2px solid #ffd700;
  padding:40px 50px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 0 30px rgba(255,215,0,0.5);
}

#name-box h2{
  color:#ffd700;
  font-size:2rem;
  margin-bottom:20px;
}

#name-input{
  width:260px;
  padding:12px 16px;
  font-size:1.2rem;
  border-radius:10px;
  border:2px solid #ffd700;
  background:rgba(0,0,0,0.4);
  color:#fff;
  text-align:center;
  outline:none;
}

#name-input::placeholder{
  color:#ccc;
}

#name-submit{
  margin-top:20px;
  background:#ffd700;
  color:#000;
  padding:12px 40px;
  font-size:1.3rem;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}

#name-submit:hover{
  background:#ffea70;
  transform:scale(1.05);
}
.leaderboard-name {
  white-space: nowrap;
}
#name-warning {
  color: #ffd700;
  font-size: 1.1rem;
  font-weight: bold;
  text-align: center;
  margin-bottom: 10px;
  display: none; /* hidden until needed */
}  
</style>
</head>

<body>
<!-- NAME ENTRY SCREEN -->
<div id="name-screen">
  <div id="name-box">
    <h2>ENTER PLAYER NAME</h2>
    <div id="name-warning"></div>
    <input id="name-input" type="text" placeholder="ENTER NAME">
    <button id="name-submit" onclick="submitName()">START</button>
  </div>
</div>
<!-- ===== FRONT PAGE ===== -->
<div id="front-page">
  <img src="cover.png" id="front-background">
  <div id="front-content">
    <img src="millionaire-logo.png" id="front-logo">
    <button id="start-btn" onclick="openNameScreen()">START GAME</button>
    <button id="show-leaderboard-btn" onclick="openLeaderboard()">SHOW LEADERBOARD</button>
  </div>
</div>

<!-- ===== SIDE PANEL ===== -->
<div id="side-panel">
  <img src="millionaire-logo.png" id="millionaire-logo">
  <div id="permanent-ladder">
    <div class="ladder-item">$1</div>
    <div class="ladder-item">$100</div>
    <div class="ladder-item">$1,000</div>
    <div class="ladder-item">$10,000</div>
    <div class="ladder-item">$100,000</div>
    <div class="ladder-item">MELLIONAIRE</div>
  </div>
</div>

<!-- ===== GAME AREA ===== -->
<div id="layout">
  <div id="game-wrapper">
    <div id="game">
      <h1>Who Wants to Be a Mellionaire?</h1>
      <div id="player-name"></div>
      <div id="round-info"></div>
      <div id="question"></div>
      <div class="options"></div>
      <div id="locked-in"></div>
    </div>
  </div>
</div>

<!-- ===== WIN SCREEN ===== -->
<div id="win-screen">
  <canvas id="confetti-canvas"></canvas>
  <div id="win-content">
    <h1 id="win-title">CONGRATULATIONS!</h1>
    <h2 id="winner-name"></h2>
    <h3 id="win-subtext">YOU ARE NOW A MELLIONAIRE!</h3>
    <button id="play-again-btn" onclick="restartGame()">PLAY AGAIN</button>
  </div>
</div>

<!-- ===== LEADERBOARD ===== -->
<div id="leaderboard-screen">
  <div id="leaderboard-content">
    <h1>TOP PERFORMANCES</h1>

    <div id="leaderboard-columns">
      <div class="leaderboard-column" id="col1"></div>
      <div class="leaderboard-column" id="col2"></div>
      <div class="leaderboard-column" id="col3"></div>
    </div>

    <button id="close-leaderboard-btn" onclick="closeLeaderboard()">BACK</button>
  </div>
</div>
<script>
let playerName = "";
let currentRound = 0;
let currentQuestion = null;
let lastPrize = "$0";

/* ===== ROUND DEFINITIONS ===== */
const ROUNDS = [
  { name: "Round 1", prize: "$1" },
  { name: "Round 2", prize: "$100" },
  { name: "Round 3", prize: "$1,000" },
  { name: "Round 4", prize: "$10,000" },
  { name: "Round 5", prize: "$100,000" },
  { name: "Final Round", prize: "MELLIONAIRE" }
];

/* ===== QUESTIONS ===== */
const QUESTIONS = {
  1: [
    { q:"WHAT IS MEL'S MIDDLE NAME?", a:["KATE","JANE","ROSE","CLARISSA"], c:0 },
    { q:"HOW MANY SIBLINGS DOES SHE HAVE?", a:["ZERO","ONE","TWO","THREE"], c:1 },
    { q:"MEL'S PARENTS NAMES ARE?", a:["RODNEY & SANDRA","ROGER & SUZANNE","RODNEY & SUZANNE","ROGER & SANDRA"], c:2 },
    { q:"MEL'S MAIDEN NAME IS?", a:["HIGGINS","HASKINS","HOLLOWAY","HILL"], c:3 }
  ],
  2: [
    { q:"WHAT HIGH SCHOOL DID MEL ATTEND?", a:["WESTMINISTER","BLACKWOOD","IMMANUEL","WALFORD"], c:2 },
    { q:"WHAT IS OSCAR'S MIDDLE NAME?", a:["JACOB","JAMES","JOHN","JOEL"], c:1 },
    { q:"WHICH INSTRUMENT DID MEL PLAY IN HIGH SCHOOL?", a:["SAXOPHONE","GUITAR","CLARINET","TUBA"], c:0 },
    { q:"WHAT IS MEL'S FAVOURITE SPIRIT?", a:["RUM","GIN","VODKA","TEQUILA"], c:1 }
  ],
  3: [
    { q:"WHAT WAS THE THEME FOR MEL'S WEDDING?", a:["PAPER","DISCO","OCEAN","ICE"], c:0 },
    { q:"WHERE IS SNUG COTTAGE LOCATED?", a:["MANNUM","GOOLWA","MURRAY BRIDGE","VICTOR HARBOUR"], c:3 },
    { q:"WHAT FLAVOUR WAS MEL'S WEDDING CAKE?", a:["RED VELVET","LEMON","CHEESE","PISTACHIO"], c:2 },
    { q:"MEL RECENTLY MADE A CAREER CHANGE INTO WHAT FIELD?", a:["ACCOUNTING","EVENT MANAGEMENT","CONSTRUCTION","RELIGION"], c:1 }
  ],
  4: [
    { q:"WHAT STAR SIGN IS MEL?", a:["GEMINI","LIBRA","SCORPIO","ARIES"], c:3 },
    { q:"WHAT PRIMARY SCHOOL DID MEL ATTEND?", a:["HAPPY VALLEY","IMMANUEL","HALLET COVE","COROMANDEL"], c:0 },
    { q:"WHAT POSITION DID MEL PLAY FOR NETBALL?", a:["GK","C","GS","WD"], c:0 },
    { q:"WHICH OF THE FOLLOWING BONES HAS MEL BROKEN?", a:["COLLAR BONE","WRIST","LEG","NONE"], c:3 }
  ],
  5: [
    { q:"WHICH OF THE FOLLOWING HAS MEL NOT TAKEN A RIDE ON?", a:["ELEPHANT","CAMEL","HELICOPTER","MOTORBIKE"], c:3 },
    { q:"WHAT IS THE NAME OF THE BALLET SCHOOL THAT MEL ATTENDED?", a:["PIVOTAL DANCE ACADEMY","TENISON COLLEGE","TURNING POINT DANCE","ALL THAT JAZZ"], c:1 },
    { q:"IN HIGH SCHOOL, MEL HAD EXCHANGE STUDENTS FROM WHICH COUNTRY?", a:["GERMANY","ARGENTINA","JAPAN","CANADA"], c:2 },
    { q:"IN HIGH SCHOOL, MEL WAS HOUSE CAPTAIN FOR WHICH TEAM?", a:["ANDREWS","CAMDEN","MORPHETT","LOHE"], c:3 }
  ],
  6: [
    { q:"AS A CHILD, WHAT WAS MEL'S FAVOURITE GAME ON SUPER NINTENDO?", a:["SUPER MARIO BROS","ZELDA","DONKEY KONG COUNTRY","KIRBY"], c:2 },
    { q:"AT MEL'S WEDDING, WHAT COLOUR PAPER FLOWER WAS NOT USED?", a:["BLUE","YELLOW","GREEN","RED"], c:0 },
    { q:"WHAT WAS THE NAME OF MEL'S GUINEA PIG?", a:["CHARLOTTE","GINGER","PATCHES","MISSY"], c:1 },
    { q:"MEL'S FRIENDS XMAS ORIGINATED AT WHAT WINERY?", a:["HARNDORF","BIRD IN HAND","CHAPEL HILL","ECHIDNA"], c:3 }
  ]
};

/* ===== GAME START ===== */
function beginGame(){
// Name already collected from custom name screen

  document.getElementById("player-name").innerText = `Welcome, ${playerName}!`;
  document.getElementById("front-page").style.display = "none";
  document.getElementById("game").style.display = "flex";

  startGame();
}

function startGame(){
  currentRound = 0;
  lastPrize = "$0";   // ⭐ ensures wrong on Q1 = $0
  updatePermanentLadder(0);
  nextRound();
}

/* ===== LOAD NEXT ROUND ===== */
function nextRound(){
  const round = ROUNDS[currentRound];

  document.getElementById("round-info").innerText =
    `${round.name} – Prize: ${round.prize}`;

  updatePermanentLadder(currentRound);

  const qList = QUESTIONS[currentRound + 1];
  currentQuestion = qList[Math.floor(Math.random() * qList.length)];

  const locked = document.getElementById("locked-in");
  locked.style.display = "none";
  locked.innerText = "";

  displayQuestion();
}

/* ===== DISPLAY QUESTION ===== */
function displayQuestion(){
  document.getElementById("question").innerText = currentQuestion.q;

  const optionsDiv = document.querySelector(".options");
  optionsDiv.innerHTML = "";

  const labels = ["A","B","C","D"];

  currentQuestion.a.forEach((opt,index)=>{
    const btn = document.createElement("button");
    btn.className = "option-btn";

    const labelSpan = document.createElement("span");
    labelSpan.className = "option-label";
    labelSpan.innerText = labels[index];

    const textSpan = document.createElement("span");
    textSpan.innerText = opt;

    btn.appendChild(labelSpan);
    btn.appendChild(textSpan);

    btn.onclick = () => checkAnswer(btn,index);

    optionsDiv.appendChild(btn);
  });
}

/* ===== CHECK ANSWER ===== */
function checkAnswer(button,index){
  const buttons = document.querySelectorAll(".option-btn");
  buttons.forEach(b => b.disabled = true);

  const locked = document.getElementById("locked-in");
  locked.innerText = "LOCKED IN";
  locked.style.display = "block";

  button.classList.add("locked");

  setTimeout(()=>{

    if(index === currentQuestion.c){
      button.classList.remove("locked");
      button.classList.add("correct");

      // ⭐ Correct scoring fix:
      // Only update lastPrize when they PASS a round
      lastPrize = ROUNDS[currentRound].prize;

      setTimeout(()=>{
        locked.style.display = "none";
        currentRound++;

        if(currentRound >= ROUNDS.length){
          showWinScreen();
          return;
        }

        nextRound();
      },2000);

    } else {
      button.classList.remove("locked");
      button.classList.add("wrong");

      const allButtons = document.querySelectorAll(".option-btn");
      allButtons[currentQuestion.c].classList.add("correct");

      setTimeout(()=>{ showLossScreen(); },10000);
    }

  },5000);
}

/* ===== UPDATE LADDER ===== */
function updatePermanentLadder(roundIndex){
  const items = document.querySelectorAll("#permanent-ladder .ladder-item");

  items.forEach((item,i)=>{
    item.classList.remove("active","reached");
    if(i < roundIndex) item.classList.add("reached");
    if(i === roundIndex) item.classList.add("active");
  });
}

/* ===== WIN / LOSS ===== */
function showWinScreen(){
  document.getElementById("game").style.display = "none";
  document.getElementById("winner-name").innerText = playerName;
  document.getElementById("win-title").innerText = "CONGRATULATIONS!";
  document.getElementById("win-subtext").innerText = "YOU ARE NOW A MELLIONAIRE!";
  document.getElementById("win-screen").style.display = "flex";

  saveScore(playerName,"MELLIONAIRE");
  startConfetti();
}

function showLossScreen(){
  document.getElementById("game").style.display = "none";
  document.getElementById("winner-name").innerText = playerName;
  document.getElementById("win-title").innerText = "BAD LUCK";
  document.getElementById("win-subtext").innerText = `Enjoy your ${lastPrize}`;
  document.getElementById("win-screen").style.display = "flex";

  saveScore(playerName,lastPrize);
}

function restartGame(){
  document.getElementById("win-screen").style.display = "none";
  document.getElementById("front-page").style.display = "flex";

  confettiPieces = [];
  updatePermanentLadder(0);
  renderLeaderboard();
}
/* ===== LEADERBOARD SYSTEM (TOP 60) ===== */

function prizeToValue(prize){
  if(prize === "MELLIONAIRE") return 1000001;
  const num = parseInt(prize.replace(/[^0-9]/g,"")) || 0;
  return num;
}

function loadScores(){
  try{
    const raw = localStorage.getItem("mellionaire_scores");
    if(!raw) return [];
    return JSON.parse(raw);
  }catch(e){
    return [];
  }
}

function saveScores(arr){
  localStorage.setItem("mellionaire_scores", JSON.stringify(arr));
}

function saveScore(name, prize){
  let scores = loadScores();
  scores.push({name, prize});

  scores.sort((a,b)=> prizeToValue(b.prize) - prizeToValue(a.prize));

  // ⭐ Now stores TOP 60
  if(scores.length > 60) scores = scores.slice(0,60);

  saveScores(scores);
}

function renderLeaderboard(){
  const col1 = document.getElementById("col1");
  const col2 = document.getElementById("col2");
  const col3 = document.getElementById("col3");

  col1.innerHTML = "";
  col2.innerHTML = "";
  col3.innerHTML = "";

  const scores = loadScores();
  const filled = [];

  // ⭐ Fill 60 rows (or blanks)
  for(let i=0;i<60;i++){
    if(scores[i]){
      filled.push({number:i+1, name:scores[i].name, prize:scores[i].prize});
    } else {
      filled.push({number:i+1, name:"—", prize:"—"});
    }
  }

  // Column 1: 1–20
  for(let i=0;i<20;i++){
    const line = document.createElement("div");
    line.className = "leaderboard-line";
    line.innerHTML = `<span class="leaderboard-name">${filled[i].number}. ${filled[i].name} — ${filled[i].prize}</span>`;
    col1.appendChild(line);
  }

  // Column 2: 21–40
  for(let i=20;i<40;i++){
    const line = document.createElement("div");
    line.className = "leaderboard-line";
    line.innerHTML = `<span class="leaderboard-name">${filled[i].number}. ${filled[i].name} — ${filled[i].prize}</span>`;
    col2.appendChild(line);
  }

  // Column 3: 41–60
  for(let i=40;i<60;i++){
    const line = document.createElement("div");
    line.className = "leaderboard-line";
    line.innerHTML = `<span class="leaderboard-name">${filled[i].number}. ${filled[i].name} — ${filled[i].prize}</span>`;
    col3.appendChild(line);
  }
}

function openLeaderboard(){
  renderLeaderboard();
  document.getElementById("leaderboard-screen").style.display = "flex";
}

function closeLeaderboard(){
  document.getElementById("leaderboard-screen").style.display = "none";
}

/* ===== CONFETTI ===== */

const confettiCanvas = document.getElementById("confetti-canvas");
const confettiCtx = confettiCanvas.getContext("2d");

function resizeConfetti(){
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
resizeConfetti();
window.addEventListener("resize", resizeConfetti);

let confettiPieces = [];

function createConfettiPiece(){
  return {
    x: Math.random() * confettiCanvas.width,
    y: -20,
    size: Math.random() * 8 + 4,
    speedY: Math.random() * 3 + 2,
    speedX: (Math.random() - 0.5) * 2,
    rotation: Math.random() * 360,
    rotationSpeed: (Math.random() - 0.5) * 10,
    color: Math.random() > 0.5 ? "#FFD700" : "#FFF5A3"
  };
}

function startConfetti(){
  confettiPieces = [];
  for(let i=0;i<150;i++){
    confettiPieces.push(createConfettiPiece());
  }
}

function updateConfetti(){
  confettiCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);

  confettiPieces.forEach((p,index)=>{
    p.y += p.speedY;
    p.x += p.speedX;
    p.rotation += p.rotationSpeed;

    if(p.y > confettiCanvas.height + 20){
      confettiPieces[index] = createConfettiPiece();
    }

    confettiCtx.save();
    confettiCtx.translate(p.x, p.y);
    confettiCtx.rotate((p.rotation * Math.PI) / 180);
    confettiCtx.fillStyle = p.color;
    confettiCtx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
    confettiCtx.restore();
  });

  requestAnimationFrame(updateConfetti);
}
updateConfetti();

/* ===== INITIALIZE LEADERBOARD ON LOAD ===== */
renderLeaderboard();
function submitName(){
  const input = document.getElementById("name-input").value.trim().toUpperCase();
  if (!input) return;

  const warning = document.getElementById("name-warning");
  warning.style.display = "none"; // reset warning

  const scores = loadScores();
  const existingNames = scores.map(s => s.name.toUpperCase());

  // Duplicate name check
  if (existingNames.includes(input)) {
    warning.innerText = "NAME ALREADY EXISTS, TRY ADDING A LAST NAME INITIAL";
    warning.style.display = "block";
    return;
  }

  // Name is valid
  playerName = input;

  // Hide name screen
  document.getElementById("name-screen").style.display = "none";

  // Start game immediately
  beginGame();
}
  function openNameScreen(){
  document.getElementById("front-page").style.display = "none";
  document.getElementById("name-screen").style.display = "flex";

  // Clear previous player's name
  document.getElementById("name-input").value = "";
}
</script>
